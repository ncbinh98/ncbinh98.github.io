            - paragraph [ref=e321]: Quán có hai tầng với nhiều không gian ngồi khác nhau, được chú trọng vào khâu trang trí nên từng góc của “Nhà cà phê” đều rất xinh, “lên hình” thì đẹp miễn bàn nhé! Nếu không thích không gian trong nhà, bạn có thể chọn không gian ngoài trời thoáng đãng và yên tĩnh. Những ô cửa kính trong suốt nhìn ra lùm cây xanh rì, giàn hoa giấy đang nở rộ,... đẹp như một khúc tình tự vậy! Gọi cho mình một ly trà đen macchiato vàcà phêsữa đá, chúng tớ ngồi một góc trò chuyện và ngắm con phố bình yên qua ô cửa.
            - generic [ref=e322]:
