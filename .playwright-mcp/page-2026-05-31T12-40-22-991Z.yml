          - generic [ref=e126]:
            - paragraph [ref=e129]:
              - generic [ref=e130]: Thành phố biển Vũng Tàu là điểm đến không còn xa lạ với các tín đồ du lịch. Những ngày nghỉ lễ, chúng tớ đã chuyến khám phá Vũng Tàu đầy thú vị, hấp dẫn. Để tớ kể cho các bạn nghe 1001 lí do để Vũng Tàu xứng đáng là nơi để gửi gắm cả tuổi thanh xuân tươi đẹp bên những người bạn của mình nhé! Hãy theo chân chúng tớ nào trong hành trình khám phá Vũng Tàu có gì chơi trong 2 ngày 1 đêm nhé!
            - paragraph [ref=e134]: Thanh xuân ở Vũng Tàu.
            - paragraph [ref=e137]: Nằm cách thành phố Hồ Chí Minh khoảng 100 km, Vũng Tàu được mệnh danh là thành phố biển đẹp nhất nhì phía Nam. Để tới Vũng Tàu, chúng tớ chọn phương tiện xe khách để tiết kiệm thời gian và “dành sức” để chơi đó bạn. Hơn 1 giờ đồng hồ là chúng tớ đã đặt chân tới thành phố biển xinh đẹp này rồi. Lần đầu tiên tới Vũng Tàu, thành phố đã làm chúng tớ “yêu ngay từ cái nhìn đầu tiên” bởi những bờ biển xanh sóng vỗ, bởi không khí trong lành nơi biển khơi, bởi những điểm du lịch hấp dẫn, bởi những quán cà phê siêu xinh,...
            - 'heading "Lí do 1: Cây cô đơn ở bãi Dứa mộng mơ" [level=2] [ref=e139]'
            - paragraph [ref=e142]: Bãi Dứa (hay còn gọi là Bãi Lãng Du) nằm ở giữa Bãi Trước và Bãi Sau, phía Tây núi Nhỏ, gần mũi Nghinh Phong. Bãi Dứa là một trong những bãi biển đẹp nhất Vũng Tàu và thu hút nhiều khách du lịch đến Vũng Tàu. Cái tên bãi Dứa xuất phát từ những cây dứa dại - một loại thảo mộc có gai, có hương thơm như gạo nếp hoặc gạo nàng hương tỏa hương thơm ngát một vùng - mọc rất nhiều ở những triền núi nhô ra biển. Ngoài ra, bãi biển còn có tên gọi khác là Bãi Lãng Du do một chủ kinh doanh đặt tên cho bãi tắm mình quản lý tại đây.
            - generic [ref=e143]:
              - img "vũng tàu có gì chơi-bãi dứa" [ref=e144]
              - paragraph [ref=e147]: Bãi Dứa buổi chiều.
            - paragraph [ref=e150]: Chúng tớ ghé bãi Dứa vào buổi chiều, hôm ý trời nắng vàng ươm. Những cây dứa dại hay làn nước biển dưới vạt nắng trở nên rực rỡ hơn rất nhiều. Người dân gần đây bảo ngắm hoàng hôn trên biển bãi Dứa là khoảnh khắc mà khách du lịch không nên bỏ lỡ. Chúng tớ không được ngắm nhìn khoảnh khắc cuối ngày đó vì 5 giờ chiều, trời cơn mưa nhưng bù lại, cảnh sắc bãi Dứa khi ấy làm lòng tớ xốn xang làm sao!
            - generic [ref=e151]:
              - img "vũng tàu có gì chơi-bãi dứa" [ref=e152]
              - paragraph [ref=e155]: Màu xanh của nước biển và bầu trời.
            - generic [ref=e156]:
              - img "vũng tàu có gì chơi-bãi dứa" [ref=e157]
              - paragraph [ref=e160]: Bức ảnh thanh xuân.
            - generic [ref=e161]:
              - img "vũng tàu có gì chơi-bãi dứa" [ref=e162]
              - paragraph [ref=e165]: Cảnh đẹp như “ở bển”.
            - paragraph [ref=e168]: Đi tản bộ dưới bãi đá, chúng tớ bắt gặp cái cây cô đơn đang vươn mình ra biển. Dứa dại mọc trên đá. Bầu trời xanh, nước biển xanh,... Chúng tớ không quên lưu lại những bức hình thanh xuân ở bãi Dứa.
            - 'heading "Lí do 2: Ngọn hải đăng lâu đời nhất Đông Nam Á" [level=2] [ref=e170]'
            - paragraph [ref=e173]: Tọa lạc trên đỉnh núi Nhỏ (hay còn gọi là núi Tương Phùng), thuộc thành phố Vũng Tàu, hải đăng Vũng Tàu nằm ở độ cao 170 m so với mực nước biển. Đây là một trong những ngọn hải đăng có lịch sử lâu đời nhất Việt Nam cũng như trong khu vực Đông Nam Á.
            - generic [ref=e174]:
              - img "vũng tàu có gì chơi-hải đăng vũng tàu" [ref=e175]
              - paragraph [ref=e178]: Từ ngọn hải đăng nhìn ra tượng Chúa Kito.
            - paragraph [ref=e181]: Chúng tớ tham quan ngọn hải đăng - biểu tượng của thành phố biển - vào buổi chiều. Con đường đèo dốc lên dốc xuống dẫn tớ tới điểm du lịch hấp dẫn của Vũng Tàu - ngọn hải đăng. Điều đặc biệt của hải đăng Vũng Tàu không chỉ là kiến trúc cổ kính mà còn là view ngắm trọn vẹn thành phố biển từ trên cao.
            - generic [ref=e182]:
              - img "vũng tàu có gì chơi-hải đăng vũng tàu" [ref=e183]
              - paragraph [ref=e186]: Bức ảnh thanh xuân thứ hai.
            - generic [ref=e187]:
              - img "vũng tàu có gì chơi-hải đăng vũng tàu" [ref=e188]
              - paragraph [ref=e191]: Từ dưới nhìn lên hải đăng.
            - paragraph [ref=e194]: Được thiết kế với kiến trúc hình trụ cao 18 m, có đường kính 3 m, hải đăng có màu sơn trắng. Vì lên muộn nên khi ấy chúng tớ không lên được ngọn hải đăng, lời khuyên dành cho bạn là hãy ghé tham quan địa điểm này sớm nhé!
            - 'heading "Lí do 3: Ngồi ngắm biển dài nhất Vũng Tàu vào sáng sớm" [level=2] [ref=e196]'
            - paragraph [ref=e199]: Trong những bãi biển tại Vũng Tàu, Bãi Sau - Bãi Thùy Vân là bãi biển dài nhất của Vũng Tàu (8 km) và cũng là bãi biển đắt khách nhất Vũng Tàu với hàng trăm khách sạn, nhả nghỉ từ nhỏ lẻ đến sang trọng, cùng hệ thống dịch vụ phong phú và đa dạng. Bãi Sau được ưa thích bởi cả dân địa phương và khách du lịch là vì bãi biển đẹp, có góc nhìn xa xa ra Hòn Bà, và an toàn hơn hẳn Bãi Trước do bãi cát đều, thoai thoải.
            - generic [ref=e200]:
              - img "vũng tàu có gì chơi-bãi sau-bãi thùy vân"
              - paragraph [ref=e203]: Đợi bình minh lên.
            - generic [ref=e204]:
              - img "vũng tàu có gì chơi-bãi sau-bãi thùy vân"
              - paragraph [ref=e207]: Người dân đi tập thể dục.
            - generic [ref=e208]:
              - img "vũng tàu có gì chơi-bãi sau-bãi thùy vân"
              - paragraph [ref=e211]: Khung cảnh bình yên.
            - generic [ref=e212]:
              - img "vũng tàu có gì chơi-bãi sau-bãi thùy vân"
              - paragraph [ref=e215]: Trên bờ biển.
            - 'heading "Lí do 4: Cổng Trời nơi hạ giới" [level=2] [ref=e217]'
            - paragraph [ref=e220]: Cổng trời tọa lạc tại Khu du lịch Mũi Nghinh Phong, số 1 đường Hạ Long, thành phố Vũng Tàu, ngay gần cung đường đến tượng Chúa dang tay. Mới nổi lên cách đây 1 năm, giờ đây Cổng Trời đã là tọa độ check-in không thể bỏ qua khi tới thành phố. Cổng Trời thần kì màu vàng này mở ra trước mắt bạn bức tranh biển cả mênh mông hòa cùng màu trời xanh thanh thiên.
            - generic [ref=e221]:
              - img "vũng tàu có gì chơi-Cổng Trời"
              - paragraph [ref=e224]: Cổng Trời nhìn ra biển.
            - generic [ref=e225]:
              - img "vũng tàu có gì chơi-Cổng Trời"
              - paragraph [ref=e228]: Đẹp như một bức tranh.
            - paragraph [ref=e231]: Chỉ cần đứng vào Cổng Trời nơi hạ giới này, bạn sẽ ngay những shoot hình siêu “nghệ” đó! Thêm một lí do cho bạn tới Vũng Tàu rồi phải không nào?
            - 'heading "Lí do 5: Mũi Nghinh Phong “độc nhất vô nhị”" [level=2] [ref=e233]'
            - paragraph [ref=e236]: Mũi Nghinh Phong là mũi đất vươn dài phía Nam bán đảo Vũng Tàu. Nghinh Phong có nghĩa là đón gió, địa điểm này đón gió 4 mùa và vươn dài ra biển tạo hai Vịnh lớn và hai bãi tắm nổi tiếng là bãi Vọng Nguyệt (hay Ô Quắn) - bãi Hương Phong (hay bãi Dứa).Nếu bạn gõ tìm kiếm trên mạng Mũi Nghinh Phong - Vũng Tàu khi hiện trên đó là những bức hình phong cảnh sơn thủy hữu tình, đặc biệt là những nấc thang nằm giữa màu xanh của cỏ cây trông rất hút mắt.
            - generic [ref=e237]:
              - img "vũng tàu có gì chơi-mũi nghinh phong"
              - paragraph [ref=e240]: Bức ảnh thanh xuân thứ 3.
            - paragraph [ref=e243]: "Chúng tớ tới khu du lịch này và tìm kiếm những gì như đã thấy trong “ảnh mạng” nhưng theo lời chú bảo vệ, để ra được đó thì phải đi qua quán cà phê bỏ hoang mà giờ đây, vì sự an toàn nên quán đã bị cấm vào hoàn toàn. Bù lại đó, chúng tớ được ngắm nhìn bãi Vọng Nguyệt với làn nước rất trong và sạch. Bạn lưu ý nhé: Sóng ở đây lớn và xoáy nên bạn chỉ nên tới đây hóng gió chứ đừng tắm đó!"
            - 'heading "Lí do 6: Điều ước ở tượng Chúa dang tay" [level=2] [ref=e245]'
            - paragraph [ref=e248]: Tượng Chúa Kito (còn gọi là tượng Chúa dang tay) tọa lạc trên đỉnh núi Tao Phùng cao 176 m. Người ta bảo nếu đứng trên cánh tay Chúa cầu nguyện thì mọi điều ước chân chính đều trở thành hiện thực. Phải chăng vì lí do đó mà rất nhiều khách du lịch tới đây, đặc biệt là những cặp đôi yêu nhau.
            - generic [ref=e249]:
              - img "vũng tàu có gì chơi-Tượng chúa Kito"
              - paragraph [ref=e252]: Tượng chúa Kito.
            - paragraph [ref=e255]: Để hiện thực hóa ước mơ của mình, bạn sẽ phải leo qua 777 bậc đá để tới điểm đến. Chúng tớ leo lên tượng Chúa vào buổi trưa nắng, lúc mỏi chân thì mấy đứa ngồi ghế đá nghỉ ngơi một xíu rồi đi tiếp. Khung cảnh hai bên đường với những cây hoa sứ thơm thoang thoảng như làm xua đi nỗi mệt của mấy đứa.
            - generic [ref=e256]:
              - img "vũng tàu có gì chơi-Tượng chúa Kito"
              - paragraph [ref=e259]: Chỗ nghỉ chân.
            - generic [ref=e260]:
              - img "vũng tàu có gì chơi-Tượng chúa Kito"
              - paragraph [ref=e263]: Buổi trưa nắng.
            - paragraph [ref=e266]: Vì không tìm hiểu kĩ nên chúng tớ lên tới nơi, tượng Chúa đã đóng cửa nên lời khuyên dành cho bạn là hãy lên trước 12 giờ trưa và sau 2 giờ chiều để có thể vào bên trong tượng Chúa, đứng trên cánh tay của Chúa để ngắm nhìn cảnh biển Vũng Tàu nên thơ nhé!
