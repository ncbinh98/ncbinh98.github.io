            - paragraph [ref=e358]: Nằm ở số 155/2 đường Ba Cu, phường 4, TP. Vũng Tàu, Bohemiens là một quán cà phê mang phong cách như chính cái tên của quán. Vì nằm trong con ngõ nhỏ nên quán rất yên tĩnh, thích hợp cho những bạn muốn tìm nơi “đi trốn” khỏi những bộn bề, lo toan của cuộc sống.
            - generic [ref=e359]:
