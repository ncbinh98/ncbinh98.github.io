            - paragraph [ref=e345]: Milla không có view biển ngắm hoàng hôn đẹp như trước nhưng vẫn cho người tới kẻ đi những cung bậc cảm xúc mà chỉ có tới Milla mới có được. Chúng tớ qua quán vào buổi chiều tối. Khi ấy Milla đã lên đèn, gọi vài chai bia lạnh cùng đồ ăn vặt, mấy đứa ngồi trò chuyện rồi để những bài hát phát lên từ chiếc loa đưa chúng tớ đi hết từ cung bậc cảm xúc này sang cung bậc cảm xúc khác.
