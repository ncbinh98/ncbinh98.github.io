            - heading "Hãy uống một chai bia lạnh ở Milla Nakedsoul" [level=3] [ref=e327]
            - paragraph [ref=e330]: Trước khi đi Vũng Tàu, chúng tớ đã bảo trước với nhau nhất định phải ngắm hoàng hôn ở Milla Nakedsoul - quán bar, cafe nằm ven biển. Nhưng do thành phố quy hoạch đất nên quán chuyển sang địa chỉ mới ở số 151 Ba Cu, TP. Vũng Tàu. Milla “mới” nằm trong một con ngõ nhỏ với khoảnh sân mát mẻ kê vài bộ bàn ghế gỗ thô mộc, với không gian “trong nhà” giản dị cùng bức tường đậm hơi thở biển khơi, với tường menu độc đáo,...
            - generic [ref=e331]:
