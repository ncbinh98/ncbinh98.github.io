              - paragraph [ref=e362]: Cậu bạn chơi đàn.
            - paragraph [ref=e365]: Quán có 2 tầng và không quá rộng, chúng tớ ghé buổi sáng trong tuần nên Bohemiens vẫn thưa khách. Bên trong quán được trang trí khá nhiều những vật dụng cổ như những chiếc ti vi đời đầu, máy may, máy chụp hình,... cho bạn cảm giác như đang trên chuyến tàu trở lại tuổi thơ ấu.
            - generic [ref=e366]:
              - img "vũng tàu có gì chơi-Bohemiens"
              - paragraph [ref=e369]: Một góc nhỏ của quán.
            - paragraph [ref=e372]: Phía bên ngoài ban công nhỏ xinh tầng 2 là chỗ chúng tớ ngồi. Bức tường ban công được sơn màu vàng và trang trí mang phong cách biển khơi. Gọi cà phê sữa, chúng tớ ngồi nghe cậu bạn chơi đàn, lời ca tiếng nhạc vang lên như tiếp thêm niềm vui vào lòng mỗi đứa. Bohemiens có thức uống khá độc đáo với giá cả rất “hạt dẻ”, dao động từ 15.000 – 35.000 VND tùy loại.
