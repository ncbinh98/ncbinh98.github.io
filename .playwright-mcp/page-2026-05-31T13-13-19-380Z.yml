                      - article [ref=e143]:
                        - generic [ref=e144]:
                          - img "🍩" [ref=e145]
                          - text: Lần trước tui ghé chi nhánh 1 là đã mê cái bánh donut caramel hottrend bên này rồi, mà đợt quay lại mới biết quán vừa khai trương thêm chi nhánh 2 ở Bình Giã
                          - img "🍰" [ref=e146]
                          - text: . Không gian mới rộng rãi hơn, ngồi học bài, gặp bạn bè hay đi cùng gia đình đều hợp vibe hết á
                          - img "✨" [ref=e147]
                          - img "🍩" [ref=e148]
                          - text: "Bên này vẫn giữ món best seller là dòng Donut Caramel Hot Trend với 3 vị: truyền thống, matcha và tiramisu"
                          - img "🍮" [ref=e149]
                          - text: . Chưa hết, tiệm có bánh mì 6 múi siêu mê cho hội chị em nè, đảm bảo Vũng Tàu chưa nơi nào có
                          - img "🍞" [ref=e150]
                          - img "🍞" [ref=e151]
                          - text: ". Mà dịp khai trương còn có combo quá hời nè: Combo 2 Donut + 1 đồ uống bất kỳ chỉ 65K và combo 2 trà sữa free luôn 2 mini donuts"
                          - img "🧋" [ref=e152]
                          - img "🍩" [ref=e153]
                          - text: . Mấy combo này hiện chỉ áp dụng ở chi nhánh mới thôi nha.
                          - img "🍩" [ref=e154]
                          - text: Mà công nhận mỗi lần tui ghé quán là tiệm lại ra món mới. Đợt này tui bị mê nhất cái món Pizza Bomb
                          - img "🍕" [ref=e155]
                          - text: ", nghe tên thôi đã tò mò rồi. Pepperoni với phô mai đều nhập khẩu từ Mỹ nên ăn béo thơm cực kỳ, vị ngon kiểu như đang ăn pizza ở mấy tiệm sang xịn luôn á mà chỉ có 35k thui"
                          - img "🍕" [ref=e156]
                          - text: . Ở Vũng Tàu tui chưa thấy chỗ nào bán món này luôn, mọi người ghé thử đi đảm bảo mê
                          - img "👍🏻" [ref=e157]
                          - img "🍩" [ref=e158]
                          - text: Ngoài ra còn có bánh mì bí ngô làm theo công nghệ Nhật Bản, dùng bí ngô thật để làm bánh nên bánh mềm ẩm tự nhiên, không phụ gia hay chất bảo quản
                          - img "🥯" [ref=e159]
                          - text: . Thêm dòng New York Chocolate tới 5 vị mà chỉ 15k/cái thôi nè
                          - img "🍪" [ref=e160]
                          - text: . Với cả mấy em bánh su giòn nhỏ nhỏ xinh xinh, ăn vui miệng lắm á
                          - img "🤩" [ref=e161]
                          - img "🍩" [ref=e162]
                          - text: Đi ăn bánh thì tất nhiên không thể thiếu trà trái cây hay trà sữa rồi
                          - img "🧋" [ref=e163]
                          - img "🍹" [ref=e164]
                          - text: . Bên này còn có mấy món mix giữa trà và cà phê uống khá lạ mà thơm cực kỳ, ai thích thử vị mới nên ghé thử nha. Grand Opening chỉ sale đúng 7 ngày thôi nên tranh thủ đi sớm nè
